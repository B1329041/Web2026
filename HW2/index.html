<!DOCTYPE html>

<style>
    table {

    th,td {
        border: 1px solid #ddd;
        padding: 6px;
        text-align: left;
    }
    tr:nth-child(even) {

    }
 
    th {
        padding-top: 12px;

    }
    button#change-btn {
